<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Vertical Slider */
        input[type=range][orient=vertical] {
            appearance: slider-vertical;
            width: 8px;
            height: 100px;
            cursor: pointer;
            accent-color: #5cb874; 
        }
        
        /* Horizontal Slider */
        input[type=range].horizontal-slider {
            accent-color: #5cb874;
            height: 4px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Video Gradient Overlay */
        .video-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.7) 100%);
            transition: opacity 0.3s ease;
        }

        /* Ad Placeholder Styling */
        .ad-placeholder {
            background-image: repeating-linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9), repeating-linear-gradient(45deg, #f1f5f9 25%, #ffffff 25%, #ffffff 75%, #f1f5f9 75%, #f1f5f9);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        /* Fullscreen Mode Styles */
        :fullscreen #player-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            padding: 0;
        }
        :fullscreen #video-container {
            border-radius: 0;
            height: 100%;
        }
    </style>
</head>
<body class="p-2 md:p-6 w-full">

    <div class="w-full max-w-5xl h-[60px] md:h-[90px] rounded-xl border-2 border-dashed border-slate-300 ad-placeholder flex flex-col items-center justify-center opacity-70 mb-4 mx-auto mt-2">
        <span class="text-slate-500 text-[10px] md:text-xs font-bold tracking-widest uppercase">Advertisement</span>
        <span class="text-slate-400 text-[8px] md:text-[10px]">(Top Banner Space)</span>
    </div>

    <div id="player-wrapper" class="bg-white p-3 md:p-5 rounded-2xl md:rounded-[2rem] shadow-xl w-full max-w-5xl flex flex-col gap-3 mx-auto relative">
        
        <div class="flex justify-between items-center px-1 pb-2 border-b border-slate-100">
            <div class="flex items-center gap-2 md:gap-4 flex-1 overflow-hidden">
                <button onclick="goBack()" class="p-1 md:p-2 hover:bg-slate-100 rounded-full transition flex-shrink-0">
                    <svg class="w-5 h-5 md:w-6 md:h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </button>
                <div class="leading-tight truncate">
                    <p class="text-[9px] md:text-[11px] text-slate-500 font-bold uppercase">Now Playing</p>
                    <h2 class="text-[12px] md:text-[15px] font-extrabold text-slate-900 truncate" id="video-title">Loading Video...</h2>
                </div>
            </div>
            <button class="bg-[#4a8a5b] text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-md">1080p</button>
        </div>

        <div id="video-container" class="relative w-full aspect-video bg-black rounded-xl md:rounded-[1.5rem] overflow-hidden group" onclick="toggleOverlay()">
            
            <div class="absolute top-3 right-4 md:top-4 md:right-6 z-20 pointer-events-none">
                <span class="text-white/40 text-[10px] md:text-[13px] font-extrabold tracking-widest drop-shadow-lg">terabox-video-player.github.io</span>
            </div>

            <div id="loading-spinner" class="absolute inset-0 flex items-center justify-center z-30 hidden bg-black/50">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-[#5cb874] border-t-transparent"></div>
            </div>

            <video id="main-video" class="w-full h-full object-contain" preload="metadata" playsinline>
                Your browser does not support video.
            </video>

            <div id="pause-ad" class="absolute inset-0 z-20 hidden flex-col items-center justify-center bg-black/50 backdrop-blur-sm" onclick="event.stopPropagation()">
                <div class="ad-placeholder w-[250px] h-[200px] md:w-[300px] md:h-[250px] rounded-2xl flex flex-col items-center justify-center shadow-2xl border border-white/20">
                    <span class="text-slate-600 text-[10px] md:text-xs font-bold tracking-widest uppercase mb-1">Advertisement</span>
                    <span class="text-slate-500 text-[8px] md:text-[9px]">(Pause Ad Space - 300x250)</span>
                </div>
                <button onclick="togglePlay()" class="mt-4 bg-white/20 hover:bg-white/30 text-white px-5 py-2 md:px-6 md:py-2.5 rounded-full backdrop-blur-md font-bold text-xs md:text-sm transition shadow-lg flex items-center gap-2">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                    Resume Video
                </button>
            </div>

            <div id="video-overlay" class="video-overlay absolute inset-0 z-10 flex flex-col justify-between opacity-100 md:opacity-0 md:group-hover:opacity-100">
                
                <div class="flex-grow flex justify-between items-center px-2 md:px-6">
                    <div class="hidden md:flex flex-col items-center gap-2" onclick="event.stopPropagation()">
                        <svg class="w-5 h-5 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <input type="range" orient="vertical" id="brightness-slider" min="0" max="200" value="100">
                    </div>

                    <div class="flex items-center gap-4 md:gap-6 mx-auto" onclick="event.stopPropagation()">
                        <button onclick="skip(-10)" class="w-10 h-10 md:w-14 md:h-14 rounded-full bg-black/40 md:bg-white/10 hover:bg-white/20 backdrop-blur-md flex items-center justify-center text-white transition">
                            <svg class="w-5 h-5 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"></path></svg>
                        </button>
                        
                        <button onclick="togglePlay()" id="center-play-btn" class="w-14 h-14 md:w-20 md:h-20 rounded-full bg-[#405b45]/90 hover:bg-[#405b45] backdrop-blur-md flex items-center justify-center text-white shadow-lg transition transform hover:scale-105">
                            <svg id="play-icon" class="w-6 h-6 md:w-10 md:h-10 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                            <svg id="pause-icon" class="w-6 h-6 md:w-10 md:h-10 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                        </button>
                        
                        <button onclick="skip(10)" class="w-10 h-10 md:w-14 md:h-14 rounded-full bg-black/40 md:bg-white/10 hover:bg-white/20 backdrop-blur-md flex items-center justify-center text-white transition">
                            <svg class="w-5 h-5 md:w-7 md:h-7 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"></path></svg>
                        </button>
                    </div>

                    <div class="hidden md:flex flex-col items-center gap-2" onclick="event.stopPropagation()">
                        <button onclick="toggleFullscreen()" class="p-2 rounded-full bg-black/40 hover:bg-black/60 text-white backdrop-blur-sm transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                    </div>
                </div>

                <div class="px-3 md:px-6 pb-2 md:pb-4 flex items-center gap-2 md:gap-4" onclick="event.stopPropagation()">
                    <span id="current-time" class="text-white font-bold text-[10px] md:text-sm drop-shadow-md w-10 md:w-12 text-right">00:00</span>
                    <input type="range" id="progress-bar" class="w-full horizontal-slider" min="0" max="100" value="0">
                    <span id="duration-time" class="text-white font-bold text-[10px] md:text-sm drop-shadow-md w-10 md:w-12">00:00</span>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap md:flex-nowrap items-center justify-between gap-2 px-1">
            <div class="flex gap-1.5 md:gap-2">
                <button onclick="togglePlay()" class="w-10 h-8 md:w-12 md:h-10 rounded-lg bg-[#f2f6f4] hover:bg-[#e4ece7] flex items-center justify-center text-[#2c5236] transition">
                    <svg class="w-4 h-4 md:w-5 md:h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <div class="flex items-center gap-2 bg-[#f2f6f4] px-3 py-1.5 md:py-2 rounded-lg flex-grow md:flex-grow-0">
                <button onclick="toggleMute()" id="mute-btn" class="text-[#2c5236] hover:text-[#1a3421] transition">
                    <svg id="vol-icon" class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                </button>
                <input type="range" id="volume-slider-horiz" class="w-full md:w-24 horizontal-slider" min="0" max="1" step="0.01" value="1">
            </div>

            <div class="flex gap-1.5 md:gap-2 ml-auto">
                <button onclick="showNotice('Subtitles (CC)')" class="w-10 h-8 md:w-12 md:h-10 rounded-lg bg-[#f2f6f4] hover:bg-[#e4ece7] flex items-center justify-center text-[#2c5236] font-bold text-[10px] md:text-sm transition">CC</button>
                <button onclick="showNotice('Settings')" class="w-10 h-8 md:w-12 md:h-10 rounded-lg bg-[#f2f6f4] hover:bg-[#e4ece7] flex items-center justify-center text-[#2c5236] transition">
                    <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <button onclick="togglePiP()" class="w-10 h-8 md:w-12 md:h-10 rounded-lg bg-[#f2f6f4] hover:bg-[#e4ece7] flex items-center justify-center text-[#2c5236] transition" title="Picture in Picture">
                    <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11h4v4h-4z"></path></svg>
                </button>
                <button onclick="toggleFullscreen()" class="w-10 h-8 md:w-12 md:h-10 rounded-lg bg-[#4a8a5b] hover:bg-[#3d754c] flex items-center justify-center text-white transition shadow-sm">
                    <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-5xl h-[60px] md:h-[90px] rounded-xl border-2 border-dashed border-slate-300 ad-placeholder flex flex-col items-center justify-center opacity-70 mt-4 mx-auto mb-2">
        <span class="text-slate-500 text-[10px] md:text-xs font-bold tracking-widest uppercase">Advertisement</span>
        <span class="text-slate-400 text-[8px] md:text-[10px]">(Bottom Banner Space)</span>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');
        const volHoriz = document.getElementById('volume-slider-horiz');
        const brightSlider = document.getElementById('brightness-slider');
        const overlay = document.getElementById('video-overlay');
        const wrapper = document.getElementById('player-wrapper');
        const pauseAd = document.getElementById('pause-ad');
        const loader = document.getElementById('loading-spinner');

        window.onload = async () => {
            const videoSrc = sessionStorage.getItem('videoSource');
            if (videoSrc) {
                loader.classList.remove('hidden');
                try {
                    const response = await fetch(videoSrc);
                    const data = await response.json();
                    if(data && data.url) {
                        video.src = data.url;
                        video.play();
                        playIcon.classList.add('hidden');
                        pauseIcon.classList.remove('hidden');
                        if(data.title) { document.getElementById('video-title').textContent = data.title; }
                    }
                } catch (error) { console.error(error); }
                finally { loader.classList.add('hidden'); }
            }
        };

        function goBack() { if (window.history.length > 1) window.history.back(); else alert("This is the main page."); }
        function showNotice(featureName) { alert(featureName + " will be available soon."); }
        function toggleOverlay() { if (window.innerWidth < 768) { if (overlay.style.opacity == "0" || overlay.style.opacity == "") { overlay.style.opacity = "1"; setTimeout(() => { if(!video.paused) overlay.style.opacity = "0"; }, 3500); } else { if(!video.paused) overlay.style.opacity = "0"; } } }
        function togglePlay() { if (video.paused) { video.play(); playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden'); pauseAd.classList.add('hidden'); pauseAd.classList.remove('flex'); if (window.innerWidth < 768) overlay.style.opacity = "0"; } else { video.pause(); playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden'); overlay.style.opacity = "1"; pauseAd.classList.remove('hidden'); pauseAd.classList.add('flex'); } }
        video.addEventListener('click', togglePlay);
        function skip(seconds) { video.currentTime += seconds; }
        function formatTime(seconds) { if(isNaN(seconds)) return "00:00"; const h = Math.floor(seconds / 3600); const m = Math.floor((seconds % 3600) / 60); const s = Math.floor(seconds % 60); if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }
        video.addEventListener('timeupdate', () => { const progress = (video.currentTime / video.duration) * 100; progressBar.value = progress || 0; currentTimeEl.textContent = formatTime(video.currentTime); });
        video.addEventListener('loadedmetadata', () => { durationTimeEl.textContent = formatTime(video.duration); });
        progressBar.addEventListener('input', (e) => { const seekTime = (e.target.value / 100) * video.duration; video.currentTime = seekTime; });
        if(volHoriz) { volHoriz.addEventListener('input', (e) => { video.volume = e.target.value; video.muted = (e.target.value === "0"); }); }
        function toggleMute() { video.muted = !video.muted; if(video.muted) volHoriz.value = 0; else volHoriz.value = video.volume || 1; }
        if(brightSlider) { brightSlider.addEventListener('input', (e) => { video.style.filter = `brightness(${e.target.value}%)`; }); }
        async function togglePiP() { try { if (video !== document.pictureInPictureElement) await video.requestPictureInPicture(); else await document.exitPictureInPicture(); } catch (error) { alert("Picture-in-Picture mode is not supported."); } }
        function toggleFullscreen() { if (!document.fullscreenElement) { if (wrapper.requestFullscreen) wrapper.requestFullscreen(); else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen(); if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); } else { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); } }
    </script>
</body>
</html>
