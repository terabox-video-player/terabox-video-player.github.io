<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERABOX LINK PLAYER</title>
    <style>
        body { font-family: sans-serif; background: #fdfdfd; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .hero { text-align: center; padding: 40px 20px; }
        .input-section { background: #064e3b; padding: 25px; border-radius: 20px; width: 90%; max-width: 600px; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px; box-sizing: border-box; }
        .play-btn { width: 100%; padding: 18px; background: #fbbf24; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; color: #064e3b; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Play TeraBox Links Instantly</h1>
    </div>
    <div class="input-section">
        <p>Paste Your TeraBox Link</p>
        <input type="text" id="urlInput" placeholder="https://www.terabox.com/...">
        <button class="play-btn" onclick="goToPlayer()">Play Now</button>
    </div>

    <script>
        function goToPlayer() {
            let url = document.getElementById('urlInput').value;
            if(url) {
                // युझरला प्लेअर पेजवर पाठवण्यासाठी
                window.location.href = "player.html?url=" + encodeURIComponent(url);
            }
        }
    </script>
</body>
</html>
